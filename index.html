<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ CA Life Quest - Gamified Goal Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700;900&display=swap');

  :root {
    --bg-primary: #0a0a1a;
    --bg-secondary: #12122a;
    --bg-card: #1a1a3e;
    --bg-card-hover: #222260;
    --gold: #ffd700;
    --gold-dark: #b8960f;
    --xp-green: #00ff88;
    --xp-green-dark: #00cc6a;
    --hp-red: #ff4466;
    --mana-blue: #4488ff;
    --mana-dark: #2255bb;
    --purple: #aa44ff;
    --orange: #ff8800;
    --cyan: #00ccff;
    --pink: #ff44aa;
    --text-primary: #e8e8ff;
    --text-secondary: #8888bb;
    --text-muted: #555580;
    --border: #2a2a5a;
    --shadow: 0 4px 20px rgba(0,0,0,0.5);
    --glow-gold: 0 0 20px rgba(255,215,0,0.3);
    --glow-green: 0 0 20px rgba(0,255,136,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(170,68,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(0,204,255,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 80%, rgba(255,68,106,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .pixel-font { font-family: 'Press Start 2P', monospace; }

  /* ===== HEADER ===== */
  .game-header {
    background: linear-gradient(180deg, #15153a 0%, var(--bg-primary) 100%);
    border-bottom: 2px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    background: linear-gradient(90deg, var(--gold), var(--orange), var(--gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .header-coins {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 900;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 0 0 10px rgba(255,215,0,0.5);
  }

  .header-coins .coin-icon {
    width: 24px; height: 24px;
    background: radial-gradient(circle at 35% 35%, #fff4a8, var(--gold), var(--gold-dark));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
  }

  /* ===== PROFILE BAR ===== */
  .profile-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .avatar {
    width: 50px; height: 50px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--purple), var(--mana-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    border: 2px solid var(--purple);
    box-shadow: 0 0 12px rgba(170,68,255,0.3);
    position: relative;
  }

  .avatar-level {
    position: absolute;
    bottom: -6px;
    right: -6px;
    background: var(--gold);
    color: #000;
    font-size: 10px;
    font-weight: 900;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg-primary);
  }

  .profile-info { flex: 1; }

  .profile-name {
    font-weight: 900;
    font-size: 15px;
    margin-bottom: 4px;
  }

  .profile-name span { color: var(--gold); }

  .xp-bar-container {
    width: 100%;
    height: 8px;
    background: #111;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 3px;
  }

  .xp-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--xp-green-dark), var(--xp-green));
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 10px rgba(0,255,136,0.5);
  }

  .xp-text {
    font-size: 10px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
  }

  .profile-stats-mini {
    display: flex;
    flex-direction: column;
    gap: 4px;
    align-items: flex-end;
  }

  .stat-mini {
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stat-mini .fire { color: var(--orange); }

  /* ===== NAVIGATION TABS ===== */
  .nav-tabs {
    display: flex;
    gap: 4px;
    padding: 10px 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-tabs::-webkit-scrollbar { display: none; }

  .nav-tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .nav-tab:hover {
    background: var(--bg-card);
    color: var(--text-primary);
  }

  .nav-tab.active {
    background: linear-gradient(135deg, var(--purple), var(--mana-blue));
    color: #fff;
    border-color: var(--purple);
    box-shadow: 0 0 15px rgba(170,68,255,0.3);
  }

  .nav-tab .badge {
    background: var(--hp-red);
    color: #fff;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 900;
  }

  /* ===== MAIN CONTENT ===== */
  .main-content {
    padding: 8px 16px 100px;
    position: relative;
    z-index: 1;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ===== SECTION HEADERS ===== */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    margin-top: 8px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== ADD TASK BUTTON ===== */
  .btn-add {
    padding: 8px 18px;
    border-radius: 10px;
    border: none;
    font-weight: 900;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-add-primary {
    background: linear-gradient(135deg, var(--xp-green-dark), var(--xp-green));
    color: #000;
    box-shadow: 0 0 15px rgba(0,255,136,0.3);
  }

  .btn-add-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 25px rgba(0,255,136,0.5);
  }

  .btn-add-secondary {
    background: linear-gradient(135deg, var(--mana-dark), var(--mana-blue));
    color: #fff;
  }

  .btn-small {
    padding: 6px 12px;
    font-size: 11px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
  }

  /* ===== CATEGORY FILTERS ===== */
  .category-filters {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .cat-filter {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }

  .cat-filter.active, .cat-filter:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: rgba(0,204,255,0.1);
  }

  /* ===== TASK CARDS ===== */
  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .task-card:hover {
    background: var(--bg-card-hover);
    transform: translateX(4px);
  }

  .task-card.completed {
    opacity: 0.5;
    border-color: var(--xp-green-dark);
  }

  .task-card.completed .task-title {
    text-decoration: line-through;
  }

  .task-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .task-card[data-cat="health"]::before { background: var(--hp-red); }
  .task-card[data-cat="study"]::before { background: var(--mana-blue); }
  .task-card[data-cat="personal"]::before { background: var(--purple); }
  .task-card[data-cat="finance"]::before { background: var(--gold); }
  .task-card[data-cat="social"]::before { background: var(--pink); }
  .task-card[data-cat="spiritual"]::before { background: var(--cyan); }

  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .task-title {
    font-weight: 700;
    font-size: 14px;
    flex: 1;
  }

  .task-rewards {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .reward-xp {
    font-size: 11px;
    color: var(--xp-green);
    font-weight: 700;
  }

  .reward-coins {
    font-size: 11px;
    color: var(--gold);
    font-weight: 700;
  }

  .task-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .task-cat-tag {
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }

  .tag-health { background: rgba(255,68,102,0.15); color: var(--hp-red); }
  .tag-study { background: rgba(68,136,255,0.15); color: var(--mana-blue); }
  .tag-personal { background: rgba(170,68,255,0.15); color: var(--purple); }
  .tag-finance { background: rgba(255,215,0,0.15); color: var(--gold); }
  .tag-social { background: rgba(255,68,170,0.15); color: var(--pink); }
  .tag-spiritual { background: rgba(0,204,255,0.15); color: var(--cyan); }

  .task-actions {
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  .btn-complete {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--xp-green-dark), var(--xp-green));
    color: #000;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-complete:hover {
    transform: scale(1.05);
    box-shadow: var(--glow-green);
  }

  .btn-delete {
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,68,102,0.3);
    background: transparent;
    color: var(--hp-red);
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-delete:hover {
    background: rgba(255,68,102,0.1);
  }

  /* ===== QUEST CARDS ===== */
  .quest-card {
    background: linear-gradient(135deg, #1e1e4a, #2a2a6a);
    border: 1px solid var(--purple);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }

  .quest-card::before {
    content: '';
    position: absolute;
    top: -50%; right: -50%;
    width: 100%; height: 100%;
    background: radial-gradient(circle, rgba(170,68,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }

  .quest-card.legendary {
    border-color: var(--gold);
    background: linear-gradient(135deg, #1e1e2a, #2a2a1a);
  }

  .quest-rarity {
    font-size: 10px;
    font-weight: 900;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 8px;
  }

  .rarity-common { background: rgba(136,136,187,0.2); color: var(--text-secondary); }
  .rarity-rare { background: rgba(68,136,255,0.2); color: var(--mana-blue); }
  .rarity-epic { background: rgba(170,68,255,0.2); color: var(--purple); }
  .rarity-legendary { background: rgba(255,215,0,0.2); color: var(--gold); }

  .quest-title {
    font-weight: 900;
    font-size: 15px;
    margin-bottom: 6px;
  }

  .quest-desc {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 10px;
    line-height: 1.5;
  }

  .quest-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .quest-progress-bar {
    flex: 1;
    height: 6px;
    background: #111;
    border-radius: 3px;
    overflow: hidden;
  }

  .quest-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 3px;
    transition: width 0.5s;
  }

  .quest-progress-text {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 700;
    white-space: nowrap;
  }

  .quest-rewards-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .quest-btn {
    padding: 6px 14px;
    border-radius: 8px;
    border: none;
    font-weight: 700;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
    margin-left: auto;
  }

  .quest-btn-claim {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #000;
  }

  .quest-btn-claim:hover { box-shadow: var(--glow-gold); transform: scale(1.05); }

  .quest-btn-claim:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  /* ===== STATS PAGE ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }

  .stat-icon { font-size: 28px; margin-bottom: 6px; }

  .stat-value {
    font-size: 24px;
    font-weight: 900;
    margin-bottom: 2px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-card.gold { border-color: var(--gold-dark); }
  .stat-card.gold .stat-value { color: var(--gold); }
  .stat-card.green { border-color: var(--xp-green-dark); }
  .stat-card.green .stat-value { color: var(--xp-green); }
  .stat-card.red { border-color: var(--hp-red); }
  .stat-card.red .stat-value { color: var(--hp-red); }
  .stat-card.blue { border-color: var(--mana-dark); }
  .stat-card.blue .stat-value { color: var(--mana-blue); }
  .stat-card.purple { border-color: var(--purple); }
  .stat-card.purple .stat-value { color: var(--purple); }
  .stat-card.orange { border-color: var(--orange); }
  .stat-card.orange .stat-value { color: var(--orange); }

  /* ===== STREAK SECTION ===== */
  .streak-display {
    background: linear-gradient(135deg, #2a1a00, #1a1a3e);
    border: 1px solid var(--orange);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .streak-display::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,136,0,0.05) 0%, transparent 50%);
    animation: pulse-bg 3s ease-in-out infinite;
  }

  @keyframes pulse-bg {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }

  .streak-fire { font-size: 48px; margin-bottom: 8px; }

  .streak-count {
    font-family: 'Press Start 2P', monospace;
    font-size: 36px;
    color: var(--orange);
    text-shadow: 0 0 20px rgba(255,136,0,0.5);
    margin-bottom: 4px;
  }

  .streak-label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 700;
  }

  .streak-calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 12px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    background: rgba(255,255,255,0.03);
    color: var(--text-muted);
  }

  .cal-day.active {
    background: linear-gradient(135deg, var(--orange), #ffaa00);
    color: #000;
    box-shadow: 0 0 8px rgba(255,136,0,0.4);
  }

  .cal-day.today {
    border: 2px solid var(--xp-green);
    color: var(--xp-green);
  }

  .cal-day.future {
    opacity: 0.3;
  }

  /* ===== ACHIEVEMENTS ===== */
  .achievements-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .achievement-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
  }

  .achievement-card.locked {
    opacity: 0.4;
    filter: grayscale(1);
  }

  .achievement-card.unlocked {
    border-color: var(--gold-dark);
    box-shadow: var(--glow-gold);
  }

  .achievement-icon { font-size: 32px; margin-bottom: 6px; }

  .achievement-name {
    font-size: 11px;
    font-weight: 700;
    margin-bottom: 2px;
    line-height: 1.3;
  }

  .achievement-desc {
    font-size: 9px;
    color: var(--text-muted);
    line-height: 1.3;
  }

  .achievement-lock {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 12px;
  }

  /* ===== SHOP ===== */
  .shop-section-title {
    font-size: 14px;
    font-weight: 900;
    color: var(--gold);
    margin: 16px 0 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .shop-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 10px;
  }

  .shop-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .shop-item:hover {
    border-color: var(--gold-dark);
    transform: translateY(-3px);
    box-shadow: var(--glow-gold);
  }

  .shop-item-icon { font-size: 36px; margin-bottom: 8px; }

  .shop-item-name {
    font-size: 12px;
    font-weight: 900;
    margin-bottom: 4px;
  }

  .shop-item-desc {
    font-size: 10px;
    color: var(--text-muted);
    margin-bottom: 10px;
    line-height: 1.4;
  }

  .shop-item-price {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.2);
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 900;
    color: var(--gold);
  }

  .btn-buy {
    width: 100%;
    margin-top: 8px;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #000;
    font-weight: 900;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-buy:hover { box-shadow: var(--glow-gold); transform: scale(1.02); }
  .btn-buy:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

  .shop-item.owned .btn-buy {
    background: linear-gradient(135deg, var(--xp-green-dark), var(--xp-green));
  }

  /* ===== INVENTORY ===== */
  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .inv-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }

  .inv-item:hover {
    border-color: var(--purple);
    transform: scale(1.05);
  }

// ===== INIT =====
function init() {
  loadState();
  checkStreak();
  renderAll();
  updatePowerupDisplay();
  checkAchievements();
}

function loadState() {
  try {
    const saved = localStorage.getItem('caLifeQuest');
    if (saved) {
      state = { ...DEFAULT_STATE, ...JSON.parse(saved) };
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
  } catch {
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  if (!state.dailyClaimDates) state.dailyClaimDates = [];
  if (!state.questProgress) state.questProgress = {};
}

function saveState() {
  localStorage.setItem('caLifeQuest', JSON.stringify(state));
}

// ===== STREAK =====
function checkStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();

  if (state.lastActiveDate === today) return;

  if (state.lastActiveDate === yesterday) {
    // streak continues (will increment when task completed)
  } else if (state.lastActiveDate && state.lastActiveDate !== today) {
    // streak broken
    if (state.inventory.streak_freeze > 0) {
      state.inventory.streak_freeze--;
      showNotification('❄️ Streak Freeze used! Streak protected!');
    } else {
      if (state.streak > state.maxStreak) state.maxStreak = state.streak;
      state.streak = 0;
    }
  }
}

function incrementStreak() {
  const today = new Date().toDateString();
  if (state.lastActiveDate !== today) {
    state.streak++;
    if (state.streak > state.maxStreak) state.maxStreak = state.streak;
    state.lastActiveDate = today;
  }
}

// ===== XP & LEVEL =====
function xpForLevel(lvl) {
  return Math.floor(50 + (lvl - 1) * 50 + (lvl - 1) * (lvl - 1) * 5);
}

function addXP(amount) {
  let finalXP = amount;

  // Double XP powerup
  const doubleXP = state.activePowerups.find(p => p.id === 'double_xp');
  if (doubleXP) finalXP *= 2;

  // Lucky charm
  const lucky = state.activePowerups.find(p => p.id === 'lucky_charm');
  if (lucky) {
    finalXP = Math.floor(finalXP * 1.5);
    lucky.uses = (lucky.uses || 3) - 1;
    if (lucky.uses <= 0) {
      state.activePowerups = state.activePowerups.filter(p => p.id !== 'lucky_charm');
      showNotification('🍀 Lucky Charm expired!');
    }
  }

  state.xp += finalXP;
  state.totalXP += finalXP;

  while (state.xp >= xpForLevel(state.level)) {
    state.xp -= xpForLevel(state.level);
    state.level++;
    showLevelUp();
  }

  updateUI();
}

function addCoins(amount) {
  const coinBoost = state.activePowerups.find(p => p.id === 'coin_boost');
  if (coinBoost) amount *= 2;

  state.coins += amount;
  state.totalCoins += amount;
  updateUI();
}

function getTitle(lvl) {
  let t = TITLES[0].title;
  for (const tt of TITLES) {
    if (lvl >= tt.lvl) t = tt.title;
  }
  return t;
}

function getAvatar(lvl) {
  return AVATARS[Math.min(Math.floor(lvl / 10), AVATARS.length - 1)];
}

// ===== TASKS =====
function openAddTask() {
  document.getElementById('addTaskModal').classList.add('show');
  document.getElementById('taskName').value = '';
  selectedDiff = 'easy';
  updateDiffButtons();
}

function closeAddTask() {
  document.getElementById('addTaskModal').classList.remove('show');
}

function selectDiff(diff) {
  selectedDiff = diff;
  updateDiffButtons();
}

function updateDiffButtons() {
  document.querySelectorAll('.diff-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.diff === selectedDiff);
  });
}

function saveTask() {
  const name = document.getElementById('taskName').value.trim();
  if (!name) { showNotification('⚠️ Enter a task name!'); return; }

  const task = {
    id: Date.now().toString(36),
    name,
    category: document.getElementById('taskCat').value,
    difficulty: selectedDiff,
    repeat: document.getElementById('taskRepeat').value,
    completed: false,
    createdAt: new Date().toISOString(),
    completedAt: null
  };

  state.tasks.unshift(task);
  saveState();
  closeAddTask();
  renderTasks();
  showNotification('📝 Task created!');
}

function completeTask(id) {
  const task = state.tasks.find(t => t.id === id);
  if (!task || task.completed) return;

  task.completed = true;
  task.completedAt = new Date().toISOString();
  state.totalTasks++;

  const rewards = DIFF_REWARDS[task.difficulty];
  addXP(rewards.xp);
  addCoins(rewards.coins);
  incrementStreak();

  // Update quest progress
  updateQuestProgress(task);

  // Update boss
  damageBoss(task);

  // Show popups
  showPopup(event, `+${rewards.xp} XP`, false);
  showPopup(event, `+${rewards.coins} 💰`, true);

  checkAchievements();
  saveState();
  renderAll();

  showNotification(`✅ Task completed! +${rewards.xp} XP, +${rewards.coins} 💰`);
}

function deleteTask(id) {
  state.tasks = state.tasks.filter(t => t.id !== id);
  saveState();
  renderTasks();
  showNotification('🗑️ Task deleted');
}

function resetDailyTasks() {
  const today = new Date().toDateString();
  state.tasks.forEach(t => {
    if (t.repeat === 'daily' && t.completed && new Date(t.completedAt).toDateString() !== today) {
      t.completed = false;
      t.completedAt = null;
    }
  });
}

function filterTasks(cat) {
  currentFilter = cat;
  document.querySelectorAll('.cat-filter').forEach(f => {
    f.classList.toggle('active', f.dataset.cat === cat);
  });
  renderTasks();
}

function renderTasks() {
  resetDailyTasks();
  const list = document.getElementById('taskList');
  let tasks = state.tasks;

  if (currentFilter !== 'all') {
    tasks = tasks.filter(t => t.category === currentFilter);
  }

  // Sort: incomplete first, then by date
  tasks.sort((a, b) => {
    if (a.completed !== b.completed) return a.completed ? 1 : -1;
    return new Date(b.createdAt) - new Date(a.createdAt);
  });

  if (tasks.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📝</div>
        <div class="empty-state-text">No tasks yet!</div>
        <div class="empty-state-sub">Create your first task to begin your quest</div>
      </div>`;
    return;
  }

  list.innerHTML = tasks.map(t => {
    const rewards = DIFF_REWARDS[t.difficulty];
    const catEmoji = { study:'📚', health:'💪', personal:'🏠', finance:'💰', social:'👥', spiritual:'🧘' };
    return `
      <div class="task-card ${t.completed ? 'completed' : ''}" data-cat="${t.category}">
        <div class="task-top">
          <div class="task-title">${t.completed ? '✅' : '⬜'} ${escHtml(t.name)}</div>
          <div class="task-rewards">
            <span class="reward-xp">+${rewards.xp} XP</span>
            <span class="reward-coins">+${rewards.coins} 💰</span>
          </div>
        </div>
        <div class="task-meta">
          <span class="task-cat-tag tag-${t.category}">${catEmoji[t.category] || ''} ${t.category}</span>
          <span>${t.difficulty.toUpperCase()}</span>
          ${t.repeat !== 'none' ? `<span>🔄 ${t.repeat}</span>` : ''}
        </div>
        <div class="task-actions">
          ${!t.completed ? `<button class="btn-complete" onclick="completeTask('${t.id}')">⚔️ Complete</button>` : ''}
          <button class="btn-delete" onclick="deleteTask('${t.id}')">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

// ===== QUESTS =====
function updateQuestProgress(task) {
  QUESTS.forEach(q => {
    if (!state.questProgress[q.id]) state.questProgress[q.id] = 0;
    if (q.claimed) return;

    let shouldIncrement = false;

    switch (q.type) {
      case 'category':
        if (task.category === q.category) shouldIncrement = true;
        break;
      case 'total':
        shouldIncrement = true;
        break;
      case 'difficulty':
        if (q.difficulty.includes(task.difficulty)) shouldIncrement = true;
        break;
      case 'streak':
        state.questProgress[q.id] = state.streak;
        break;
      case 'boss':
        // handled separately
        break;
      case 'daily':
        // handled separately
        break;
      case 'coins':
        state.questProgress[q.id] = state.totalCoins;
        break;
    }

    if (shouldIncrement) {
      state.questProgress[q.id]++;
    }
  });
}

function getQuestProgress(q) {
  if (q.type === 'streak') return state.streak;
  if (q.type === 'boss') return state.bossDefeated;
  if (q.type === 'daily') return state.dailyClaimDates.length;
  if (q.type === 'coins') return state.totalCoins;
  return state.questProgress[q.id] || 0;
}

function claimQuest(id) {
  const q = QUESTS.find(q => q.id === id);
  if (!q || q.claimed) return;

  const progress = getQuestProgress(q);
  if (progress < q.target) return;

  q.claimed = true;
  state.totalQuests++;
  addXP(q.rewards.xp);
  addCoins(q.rewards.coins);
  showNotification(`⚔️ Quest "${q.name}" completed! +${q.rewards.xp} XP, +${q.rewards.coins} 💰`);
  checkAchievements();
  saveState();
  renderQuests();
}

function renderQuests() {
  const container = document.getElementById('questList');
  const activeQuests = QUESTS.filter(q => !q.claimed);

  if (activeQuests.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎉</div>
        <div class="empty-state-text">All quests completed!</div>
        <div class="empty-state-sub">Great work! More quests coming soon.</div>
      </div>`;
    return;
  }

  container.innerHTML = activeQuests.map(q => {
    const progress = getQuestProgress(q);
    const pct = Math.min(100, (progress / q.target) * 100);
    const canClaim = progress >= q.target;

    return `
      <div class="quest-card ${q.rarity === 'legendary' ? 'legendary' : ''}">
        <span class="quest-rarity rarity-${q.rarity}">${q.rarity}</span>
        <div class="quest-title">${q.name}</div>
        <div class="quest-desc">${q.desc}</div>
        <div class="quest-progress">
          <div class="quest-progress-bar">
            <div class="quest-progress-fill" style="width:${pct}%"></div>
          </div>
          <span class="quest-progress-text">${Math.min(progress, q.target)}/${q.target}</span>
        </div>
        <div class="quest-rewards-row">
          <span class="reward-xp">🏆 +${q.rewards.xp} XP</span>
          <span class="reward-coins">💰 +${q.rewards.coins}</span>
          <button class="quest-btn quest-btn-claim" onclick="claimQuest('${q.id}')" ${!canClaim ? 'disabled' : ''}>
            ${canClaim ? '🎁 Claim' : 'In Progress'}
          </button>
        </div>
      </div>`;
  }).join('');
}

// ===== BOSS =====
function damageBoss(task) {
  const boss = BOSSES[state.currentBoss];
  if (!boss) return;

  let damage = 0;
  switch (task.difficulty) {
    case 'easy': damage = 10; break;
    case 'medium': damage = 20; break;
    case 'hard': damage = 35; break;
    case 'legendary': damage = 50; break;
  }

  state.bossHP = Math.max(0, state.bossHP - damage);

  if (state.bossHP <= 0) {
    state.bossDefeated++;
    const bonusXP = 100 + state.currentBoss * 50;
    const bonusCoins = 50 + state.currentBoss * 25;
    addXP(bonusXP);
    addCoins(bonusCoins);
    showNotification(`👹 Boss defeated! +${bonusXP} XP, +${bonusCoins} 💰`);

    state.currentBoss++;
    if (state.currentBoss >= BOSSES.length) state.currentBoss = 0;
    const nextBoss = BOSSES[state.currentBoss];
    state.bossMaxHP = nextBoss.hp;
    state.bossHP = nextBoss.hp;

    checkAchievements();
  }

  saveState();
}

function bossAttack(type) {
  const boss = BOSSES[state.currentBoss];
  if (!boss) return;

  let damage = 0;
  switch (type) {
    case 'study': damage = 15; break;
    case 'health': damage = 10; break;
    case 'task': damage = 25; break;
  }

  state.bossHP = Math.max(0, state.bossHP - damage);

  if (state.bossHP <= 0) {
    state.bossDefeated++;
    const bonusXP = 100 + state.currentBoss * 50;
    const bonusCoins = 50 + state.currentBoss * 25;
    addXP(bonusXP);
    addCoins(bonusCoins);
    showNotification(`👹 Boss defeated! +${bonusXP} XP, +${bonusCoins} 💰`);

    state.currentBoss++;
    if (state.currentBoss >= BOSSES.length) state.currentBoss = 0;
    const nextBoss = BOSSES[state.currentBoss];
    state.bossMaxHP = nextBoss.hp;
    state.bossHP = nextBoss.hp;

    checkAchievements();
  }

  saveState();
  renderBoss();
}

function renderBoss() {
  const boss = BOSSES[state.currentBoss];
  if (!boss) return;

  const hpPct = (state.bossHP / state.bossMaxHP) * 100;

  document.getElementById('bossArea').innerHTML = `
    <div class="boss-card">
      <div style="font-size:48px; margin-bottom:8px;">👹</div>
      <div class="boss-name">${boss.name}</div>
      <div class="boss-desc">${boss.desc}</div>
      <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--text-secondary); margin-bottom:4px;">
        <span>BOSS HP</span>
        <span>${state.bossHP}/${state.bossMaxHP}</span>
      </div>
      <div class="boss-hp-bar">
        <div class="boss-hp-fill" style="width:${hpPct}%"></div>
      </div>
      <div class="boss-attacks">
        <button class="btn-attack btn-attack-study" onclick="bossAttack('study')">📚 Study Strike (-15)</button>
        <button class="btn-attack btn-attack-health" onclick="bossAttack('health')">💪 Health Hit (-10)</button>
        <button class="btn-attack btn-attack-task" onclick="bossAttack('task')">📝 Task Smash (-25)</button>
      </div>

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!state.achievements.includes(a.id) && a.check(state)) {
      state.achievements.push(a.id);
      showNotification(`🏆 Achievement Unlocked: ${a.name}!`);
      addXP(50);
      addCoins(25);
    }
  });
  saveState();
}

function renderAchievements() {
  const grid = document.getElementById('achGrid');
  grid.innerHTML = ACHIEVEMENTS.map(a => {
    const unlocked = state.achievements.includes(a.id);
    return `
      <div class="achievement-card ${unlocked ? 'unlocked' : 'locked'}">
        ${!unlocked ? '<div class="achievement-lock">🔒</div>' : ''}
        <div class="achievement-icon">${a.icon}</div>

        <div class="achievement-desc">${a.desc}</div>

}

// ===== SHOP =====
function buyItem(id) {
  const item = SHOP_ITEMS.find(i => i.id === id);
  if (!item) return;

  if (state.coins < item.price) {
    showNotification('💸 Not enough coins!');
    return;
  }

  state.coins -= item.price;

  if (item.type === 'powerup') {
    if (item.duration > 0) {
      // Timed powerup
      const existing = state.activePowerups.find(p => p.id === id);
      if (existing) {
        existing.endTime += item.duration;
      } else {
        state.activePowerups.push({
          id: item.id,
          endTime: Date.now() + item.duration,
          uses: item.id === 'lucky_charm' ? 3 : undefined
        });
      }
    } else {
      // Stacking consumable powerup (streak freeze, lucky charm without timer)
      if (!state.inventory[id]) state.inventory[id] = 0;
      state.inventory[id]++;
    }
  } else if (item.type === 'instant') {
    if (item.effect === 'xp') addXP(item.value);
    if (item.effect === 'coins') addCoins(item.value);
    showNotification(`✅ Used ${item.name}!`);
  } else if (item.type === 'consumable') {
    if (!state.inventory[id]) state.inventory[id] = 0;
    state.inventory[id]++;
  }

  saveState();
  renderShop();
  renderInventory();
  updatePowerupDisplay();
  showNotification(`🛒 Purchased ${item.name}!`);
  checkAchievements();
}

function renderShop() {
  const container = document.getElementById('shopContent');
  container.innerHTML = SHOP_ITEMS.map(item => {
    const canAfford = state.coins >= item.price;
    return `
      <div class="shop-item">
        <div class="shop-item-icon">${item.icon}</div>
        <div class="shop-item-name">${item.name}</div>
        <div class="shop-item-desc">${item.desc}</div>
        <div class="shop-item-price">💰 ${item.price}</div>
        <button class="btn-buy" onclick="buyItem('${item.id}')" ${!canAfford ? 'disabled' : ''}>
          ${canAfford ? 'Buy Now' : 'Not Enough Coins'}
        </button>
      </div>`;
  }).join('');
}

// ===== INVENTORY =====
function useItem(id) {
  if (!state.inventory[id] || state.inventory[id] <= 0) return;

  const item = SHOP_ITEMS.find(i => i.id === id);
  if (!item) return;

  state.inventory[id]--;

  if (id === 'task_skip') {
    const incomplete = state.tasks.find(t => !t.completed);
    if (incomplete) {
      completeTask(incomplete.id);
      showNotification(`📜 Auto-completed: ${incomplete.name}`);
    } else {
      state.inventory[id]++;
      showNotification('⚠️ No incomplete tasks to skip!');
    }
  }

  if (state.inventory[id] <= 0) delete state.inventory[id];

  saveState();
  renderInventory();
  updateUI();
}

function renderInventory() {
  const container = document.getElementById('invContent');
  const items = Object.entries(state.inventory).filter(([k, v]) => v > 0);

  // Also show timed powerups
  const timedPowerups = state.activePowerups.map(p => {
    const item = SHOP_ITEMS.find(i => i.id === p.id);
    return { ...item, count: 'Active', timed: true, endTime: p.endTime };
  });

  if (items.length === 0 && timedPowerups.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">🎒</div>
        <div class="empty-state-text">Inventory is empty</div>
        <div class="empty-state-sub">Visit the shop to buy items!</div>
      </div>`;
    return;
  }

  let html = '';

  if (timedPowerups.length > 0) {
    html += '<div class="shop-section-title">⚡ Active Powerups</div>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;">';
    timedPowerups.forEach(p => {
      const remaining = Math.max(0, Math.ceil((p.endTime - Date.now()) / 60000));
      html += `
        <div class="active-powerup">
          ${p.icon} ${p.name}
          <span class="powerup-timer">${remaining} min remaining</span>
        </div>`;
    });
    html += '</div>';
  }

  if (items.length > 0) {
    html += '<div class="shop-section-title">🎒 Items</div>';
    html += '<div class="inventory-grid">';
    items.forEach(([id, count]) => {
      const item = SHOP_ITEMS.find(i => i.id === id);
      if (!item) return;
      html += `
        <div class="inv-item" onclick="useItem('${id}')">
          <div class="inv-item-icon">${item.icon}</div>
          <div class="inv-item-name">${item.name}</div>
          <div class="inv-item-count">${count}</div>
        </div>`;
    });
    html += '</div>';
  }

  container.innerHTML = html;
}

// ===== POWERUPS =====
function updatePowerupDisplay() {
  const container = document.getElementById('activePowerups');
  const active = state.activePowerups.filter(p => p.endTime > Date.now());

  // Clean expired
  state.activePowerups = active;
  saveState();

  if (active.length === 0) {
    container.innerHTML = '';
    return;
  }

  container.innerHTML = active.map(p => {
    const item = SHOP_ITEMS.find(i => i.id === p.id);
    if (!item) return '';
    const remaining = Math.max(0, Math.ceil((p.endTime - Date.now()) / 60000));
    return `
      <div class="active-powerup">
        ${item.icon} ${item.name}
        <span class="powerup-timer">${remaining}m left</span>
      </div>`;
  }).join('');
}

// ===== STATS =====
function renderStats() {
  const grid = document.getElementById('statsGrid');
  const completed = state.tasks.filter(t => t.completed).length;
  const total = state.tasks.length;

  grid.innerHTML = `
    <div class="stat-card green">
      <div class="stat-icon">⚡</div>
      <div class="stat-value">${state.totalXP.toLocaleString()}</div>
      <div class="stat-label">Total XP</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-icon">💰</div>
      <div class="stat-value">${state.totalCoins.toLocaleString()}</div>
      <div class="stat-label">Total Coins</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-icon">📊</div>
      <div class="stat-value">${state.level}</div>
      <div class="stat-label">Level</div>
    </div>
    <div class="stat-card orange">
      <div class="stat-icon">🔥</div>
      <div class="stat-value">${state.maxStreak}</div>
      <div class="stat-label">Best Streak</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon">✅</div>
      <div class="stat-value">${completed}</div>
      <div class="stat-label">Tasks Done</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">📋</div>
      <div class="stat-value">${total - completed}</div>
      <div class="stat-label">Pending</div>
    </div>
    <div class="stat-card gold">
      <div class="stat-icon">⚔️</div>
      <div class="stat-value">${state.totalQuests}</div>
      <div class="stat-label">Quests Done</div>
    </div>
    <div class="stat-card red">
      <div class="stat-icon">👹</div>
      <div class="stat-value">${state.bossDefeated}</div>
      <div class="stat-label">Bosses Slain</div>
    </div>`;

  // Streak calendar
  renderStreakCalendar();
}

function renderStreakCalendar() {
  const section = document.getElementById('streakSection');
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();

  let calHtml = '<div style="margin-top:16px;">';
  calHtml += '<div style="font-weight:900;margin-bottom:8px;">📅 This Month</div>';
  calHtml += '<div class="streak-calendar">';

  // Day headers
  ['S','M','T','W','T','F','S'].forEach(d => {
    calHtml += `<div class="cal-day" style="color:var(--text-muted)">${d}</div>`;
  });

  // Empty cells
  for (let i = 0; i < firstDay; i++) {
    calHtml += '<div class="cal-day future"></div>';
  }

  // Days
  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(today.getFullYear(), today.getMonth(), d);
    const dateStr = date.toDateString();
    const isToday = d === today.getDate();
    const isActive = state.tasks.some(t => t.completed && t.completedAt && new Date(t.completedAt).toDateString() === dateStr);

    calHtml += `<div class="cal-day ${isActive ? 'active' : ''} ${isToday ? 'today' : ''}">${d}</div>`;
  }

  calHtml += '</div></div>';
  section.innerHTML = calHtml;
}

// ===== DAILY REWARD =====
function claimDaily() {
  const today = new Date().toDateString();
  if (state.lastClaimDate === today) {
    showNotification('⚠️ Already claimed today!');
    return;
  }

  state.lastClaimDate = today;
  state.dailyClaimDates = state.dailyClaimDates || [];
  state.dailyClaimDates.push(today);

  const reward = 50 + Math.floor(state.streak * 5);
  addCoins(reward);
  addXP(25);

  showNotification(`🎁 Daily reward claimed! +${reward} 💰, +25 XP`);
  checkAchievements();
  saveState();
  renderAll();
}

// ===== UI UPDATES =====
function updateUI() {
  document.getElementById('headerCoins').textContent = state.coins.toLocaleString();
  document.getElementById('avatarLevel').textContent = state.level;
  document.getElementById('playerTitle').textContent = getTitle(state.level);
  document.getElementById('avatarEmoji').childNodes[0].textContent = getAvatar(state.level) + ' ';

  const needed = xpForLevel(state.level);
  const pct = Math.min(100, (state.xp / needed) * 100);
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpCurrent').textContent = state.xp + ' XP';
  document.getElementById('xpNeeded').textContent = needed + ' XP';
  document.getElementById('headerStreak').textContent = state.streak;
  document.getElementById('headerTasks').textContent = state.tasks.filter(t => !t.completed).length;

  // Inventory badge
  const invCount = Object.values(state.inventory).reduce((a, b) => a + b, 0);
  const invBadge = document.getElementById('invBadge');
  if (invCount > 0) {
    invBadge.style.display = 'inline';
    invBadge.textContent = invCount;
  } else {
    invBadge.style.display = 'none';
  }

  // Daily banner
  const dailyBanner = document.getElementById('dailyBanner');
  const today = new Date().toDateString();
  if (state.lastClaimDate === today) {
    dailyBanner.classList.add('claimed');
    dailyBanner.querySelector('.daily-reward').textContent = '✅ Claimed';
  } else {
    dailyBanner.classList.remove('claimed');
    const reward = 50 + Math.floor(state.streak * 5);
    dailyBanner.querySelector('.daily-reward').textContent = `+${reward} 💰`;
  }

  // Update powerup timers
  updatePowerupDisplay();
}

function renderAll() {
  updateUI();
  renderTasks();
  renderQuests();
  renderBoss();
  renderAchievements();
  renderShop();
  renderInventory();
  renderStats();
}

// ===== TABS =====
function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  document.querySelector(`.nav-tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');

  if (tab === 'stats') renderStats();
  if (tab === 'shop') renderShop();
  if (tab === 'inventory') renderInventory();
  if (tab === 'boss') renderBoss();
}

// ===== EFFECTS =====
function showPopup(e, text, isCoin) {
  const popup = document.createElement('div');
  popup.className = `xp-popup ${isCoin ? 'coin-popup' : ''}`;
  popup.textContent = text;
  popup.style.left = (e?.clientX || window.innerWidth / 2) + 'px';
  popup.style.top = (e?.clientY || window.innerHeight / 2) + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1500);
}

function showLevelUp() {
  document.getElementById('levelUpNum').textContent = state.level;
  document.getElementById('levelUpTitle').textContent = getTitle(state.level);
  document.getElementById('levelUpOverlay').classList.add('show');
}

function closeLevelUp() {
  document.getElementById('levelUpOverlay').classList.remove('show');
}

function showNotification(msg) {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== PERIODIC UPDATES =====
setInterval(() => {
  updatePowerupDisplay();
}, 60000);

// ===== START =====
init();
</script>
</body>
</html>
